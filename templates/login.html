{% extends "base.html" %}

{% block content %}

<div
    class="card shadow-sm mx-auto"
    style="max-width: 430px;"
>
    <div class="card-body">
        <h4 class="mb-4">Login</h4>

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input
                    type="email"
                    name="email"
                    class="form-control"
                    required
                >
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input
                    type="password"
                    name="password"
                    class="form-control"
                    required
                >
            </div>

            <button
                type="submit"
                class="btn btn-primary w-100"
            >
                Login
            </button>
        </form>
    </div>
</div>

{% endblock %}
